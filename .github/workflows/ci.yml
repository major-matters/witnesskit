name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        working-directory: python
        run: pip install cryptography rfc8785 hypothesis bandit
      - name: Unit tests
        working-directory: python
        run: PYTHONPATH=. python tests/test_trailkit.py
      - name: Property tests
        working-directory: python
        run: PYTHONPATH=. python tests/test_properties.py
      - name: Bandit
        working-directory: python
        run: bandit -r trailkit -ll
  python-fallback:
    name: Python (dependency-free fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests with no optional deps
        working-directory: python
        run: PYTHONPATH=. python tests/test_trailkit.py
  typescript:
    name: TypeScript (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        working-directory: typescript
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: typescript
        run: npm run build
      - name: Tests
        working-directory: typescript
        run: npm test
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config p/python --config p/typescript --config p/secrets --error
